<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">

	<link rel="stylesheet" type="text/css" th:href="@{/team2/css/team2_header.css}">
	<link rel="stylesheet" type="text/css" th:href="@{/team2/css/team2_main.css}">
	<link rel="stylesheet" type="text/css" th:href="@{/team2/css/team2_answers.css}">

	<title>Study Log - 回答画面</title>
</head>

<body>

	<header th:replace="~{team2/kyoutu/team2_header :: header}"></header>

	<div class="page-wrapper answers-wrapper">

		<div class="page-header">
			<a class="back-link" th:href="@{/team2/questions}">
				← 問題一覧に戻る
			</a>

			<h1 class="page-title">回答画面</h1>
		</div>

		<div class="question-card">

			<p class="form-error" th:if="${errorMessage}" th:text="${errorMessage}">
			</p>

			<div class="question-info">

				<div class="question-row">
					<span class="question-label">分野</span>
					<p class="question-text" th:text="${question.field.fieldName}"></p>
				</div>

				<div class="question-row">
					<span class="question-label">学習名</span>
					<p class="question-text" th:text="${question.studyName}"></p>
				</div>

				<div class="question-row">
					<span class="question-label">問題形式</span>
					<p class="question-text" th:text="${question.questionType}"></p>
				</div>

				<div class="question-row">
					<span class="question-label">問題文</span>
					<p class="question-text question-main" th:text="${question.questionText}">
					</p>
				</div>

			</div>

			<form method="post" th:action="@{/team2/questions/{questionId}/answer(questionId=${question.questionId})}">

				<!-- 選択式 -->
				<div class="choice-area" th:if="${question.questionType == '選択式'}">

					<label class="choice-card">
						<input type="radio" name="userAnswer" th:value="${question.choiceA}" />
						<span th:text="${question.choiceA}"></span>
					</label>

					<label class="choice-card">
						<input type="radio" name="userAnswer" th:value="${question.choiceB}" />
						<span th:text="${question.choiceB}"></span>
					</label>

					<label class="choice-card">
						<input type="radio" name="userAnswer" th:value="${question.choiceC}" />
						<span th:text="${question.choiceC}"></span>
					</label>

					<label class="choice-card">
						<input type="radio" name="userAnswer" th:value="${question.choiceD}" />
						<span th:text="${question.choiceD}"></span>
					</label>

				</div>

				<!-- 記述式 -->
				<div th:if="${question.questionType == '記述式'}">

					<span class="form-label">
						回答
						<span class="required">必須</span>
					</span>

					<input type="text" name="userAnswer" class="form-input" placeholder="回答を入力してください">

				</div>

				<div class="submit-area">
					<button type="submit" class="btn btn-primary">
						回答する
					</button>
				</div>

			</form>

		</div>

	</div>

</body>

</html>
