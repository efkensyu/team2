<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<link rel="stylesheet" type="text/css" th:href="@{/team2/css/team2_header.css}">
	<link rel="stylesheet" type="text/css" th:href="@{/team2/css/team2_main.css}">
	<link rel="stylesheet" type="text/css" th:href="@{/team2/css/team2_answers_result.css}">
	<title>study log - 採点結果</title>
</head>

<body>
	<header th:replace="~{team2/kyoutu/team2_header :: header}"></header>

	<div class="page-wrapper">

		<h1 class="page-title">採点結果</h1>

		<div class="result-message correct" th:if="${isCorrect}">
			正解です！
		</div>

		<div class="result-message incorrect" th:if="${!isCorrect}">
			不正解です...
		</div>

		<div class="result-list">

			<div class="content-card result-item">
				<span class="result-label">問題文</span>
				<p class="result-text result-main-text" th:text="${question.questionText}"></p>
			</div>

			<div class="content-card result-item">
				<span class="result-label">あなたの回答</span>
				<p class="result-text" th:text="${userAnswer}"></p>
			</div>

			<div class="content-card result-item">
				<span class="result-label">正解</span>
				<p class="result-text" th:text="${question.correctAnswer}"></p>
			</div>

			<div class="content-card result-item">
				<span class="result-label">解説</span>
				<p class="result-text" th:text="${question.explanation}"></p>
			</div>

		</div>

		<div class="button-area">
			<a th:href="@{/team2/questions}">
				<button type="button">問題一覧に戻る</button>
			</a>

			<a th:href="@{/team2/questions/{questionId}/answer(questionId=${question.questionId})}">
				<button type="button">もう一度回答する</button>
			</a>
		</div>

	</div>
</body>

</html>
