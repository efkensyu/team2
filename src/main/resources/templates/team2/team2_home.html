<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.ofg">

<head>
	<meta charset="UTF-8">
	<link rel="stylesheet" type="text/css" th:href="@{/team2/css/team2_header.css}">
		<link rel="stylesheet" type="text/css" th:href="@{/team2/css/team2_main.css}">
		<link rel="stylesheet" type="text/css" th:href="@{/team2/css/team2_home.css}">
	<title>Study Log - ホーム</title>
</head>

<body>
	<header th:replace="~{team2/kyoutu/team2_header :: header}"></header>

	<div class="page-wrapper home-wrapper">

		<h1 class="home-title" th:text="'ようこそ！ ' + ${session.userName} + ' さん'"></h1>
		<p class="home-message" th:text="学習を記録、共有して資格合格を目指しましょう！"></p>

		<div class="home-menu">

			<a th:href="@{/team2/profile}" class="home-menu-card">
				<span class="home-menu-content">
					<span class="home-menu-text">プロフィール</span>
					<span class="home-menu-description">
						学習時間や自分の記録を確認できます
					</span>
				</span>
			</a>
			
			<a th:href="@{/team2/logs}" class="home-menu-card">
				<span class="home-menu-content">
					<span class="home-menu-text">タイムライン</span>
					<span class="home-menu-description">
						みんなの学習記録を閲覧できます
					</span>
				</span>
			</a>

			<a th:href="@{/team2/logs/create}" class="home-menu-card">
				<span class="home-menu-content">
					<span class="home-menu-text">学習記録登録</span>
					<span class="home-menu-description">
						学習内容を記録できます
					</span>
				</span>
			</a>

			<a th:href="@{/team2/questions}" class="home-menu-card">
				<span class="home-menu-content">
					<span class="home-menu-text">問題一覧</span>
					<span class="home-menu-description">
						みんなが作成した問題を解けます
					</span>
				</span>
			</a>

			<a th:href="@{/team2/answers}" class="home-menu-card">
				<span class="home-menu-content">
					<span class="home-menu-text">採点結果一覧</span>
					<span class="home-menu-description">
						過去の採点結果を確認できます
					</span>
				</span>
			</a>

		</div>

	</div>

</body>

</html>
