<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.ofg">

<head>
	<meta charset="UTF-8">

	<link rel="stylesheet" type="text/css" th:href="@{/team2/css/team2_header.css}">
	<link rel="stylesheet" type="text/css" th:href="@{/team2/css/team2_main.css}">
	<link rel="stylesheet" type="text/css" th:href="@{/team2/css/team2_profile_edit.css}">

	<title>Study Log - プロフィール編集</title>
</head>

<body>

	<header th:replace="~{team2/kyoutu/team2_header :: header}"></header>

	<div class="page-wrapper profile-edit-wrapper">

		<div class="page-header">
			<a class="back-link" th:href="@{/team2/profile}" th:text="'← 戻る'"></a>
			<h1 class="page-title" th:text="プロフィール編集"></h1>
		</div>

		<div class="form-card">

			<div class="success-message" th:if="${successMessage}" th:text="${successMessage}"></div>

			<form method="post" th:action="@{/team2/profile/edit}" th:object="${team2ProfileEditForm}">

				<input type="hidden" th:field="*{userId}">

				<span class="form-label">ユーザ名<span class="required">必須</span></span>
				<span class="input-note">20文字以内で入力してください</span>
				<input type="text" th:field="*{userName}" class="form-input" placeholder="ユーザ名を入力してください">
				<span th:if="${#fields.hasErrors('userName')}" th:errors="*{userName}" class="form-error"></span>

				<span class="form-label">ログインID<span class="required">必須</span></span>
				<input type="text" th:field="*{loginId}" class="form-input" placeholder="ログインIDを入力してください">
				<span th:if="${#fields.hasErrors('loginId')}" th:errors="*{loginId}" class="form-error"></span>
				<span th:if="${loginIdError}" th:text="${loginIdError}" class="form-error"></span>

				<input type="submit" value="更新" class="btn btn-primary">
			</form>

		</div>

	</div>
</body>

</html>
