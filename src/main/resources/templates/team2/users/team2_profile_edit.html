<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.ofg">

<head>
	<meta charset="UTF-8">
	<link rel="stylesheet" type="text/css" href="/team2/css/team2_header.css">
	<title>プロフィール編集</title>
</head>

<body>
	<header th:replace="~{team2/kyoutu/team2_header :: header}"></header>
	<h1>プロフィール編集</h1>
	<a th:href="@{/team2/home}">
		<button type="button">戻る</button>
	</a>

	<form method="post" th:action="@{/team2/profile/edit}" th:object="${team2ProfileEditForm}">
		<input type="hidden" th:field="*{userId}">
		
		<h4>ユーザ名</h4>
		<input type="text" th:field="*{userName}">
		<span th:if="${#fields.hasErrors('userName')}" th:errors="*{userName}"></span>
		
		<h4>ログインID</h4>
		<input type="text" th:field="*{loginId}">
		<span th:if="${#fields.hasErrors('loginId')}" th:errors="*{loginId}"></span>
		<span th:text="${loginIdError}"></span>
		
		<br><br>
		<input type="submit" value="更新する">
	</form>

</body>

</html>
