<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.ofg">

<head>
	<meta charset="UTF-8">
	<link rel="stylesheet" type="text/css" th:href="@{/team2/css/team2_header.css}">
	<link rel="stylesheet" type="text/css" th:href="@{/team2/css/team2_main.css}">
	<link rel="stylesheet" type="text/css" th:href="@{/team2/css/team2_profile_delete.css}">
	<link rel="icon" type="image/png" th:href="@{/team2/img/team2_favicon.png}">
	<title>Study Log - 退会画面</title>
</head>

<body>
	<header th:replace="~{team2/kyoutu/team2_header :: header}"></header>

	<div class="page-wrapper profile-delete-wrapper">

		<div class="page-header">
			<a class="back-link" th:href="@{/team2/profile}" th:text="'← 戻る'"></a>
			<h1 class="page-title" th:text="退会"></h1>
		</div>

		<div class="warning-box">
			<p class="warning-title">
				⚠ 注意 ⚠
			</p>

			<p class="warning-text">
				退会するとすべてのデータが削除され、<br>
				元に戻すことはできません。
			</p>
		</div>

		<form class="delete-form" method="post" th:action="@{/team2/profile/delete}"
			th:object="${team2ProfileDeleteForm}">

			<div class="form-group">

				<label class="form-label">
					パスワード
				</label>

				<input class="form-input" type="password" th:field="*{password}" placeholder="パスワードを入力">

				<span class="error-message" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></span>

				<span class="error-message" th:if="${passwordError}" th:text="${passwordError}"></span>

			</div>

			<input class="delete-button" type="submit" value="退会する"
				onclick="return confirm('退会するとデータは元に戻せません。本当に退会しますか？')" />

		</form>

	</div>

</body>

</html>
