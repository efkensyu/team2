<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.ofg">

<head>
	<meta charset="UTF-8">
	<link rel="stylesheet" type="text/css" th:href="@{/team2/css/team2_header.css}">
	<link rel="stylesheet" type="text/css" th:href="@{/team2/css/team2_main.css}">
	<link rel="stylesheet" type="text/css" th:href="@{/team2/css/team2_profile_password.css}">
	<link rel="icon" type="image/png" th:href="@{/team2/img/team2_favicon.png}">
	<title>Study Log - パスワード変更</title>
</head>

<body>
	<header th:replace="~{team2/kyoutu/team2_header :: header}"></header>

	<div class="page-wrapper">

		<div class="page-header">
			<a class="back-link" th:href="@{/team2/profile}" th:text="'← 戻る'"></a>
			<h1 class="page-title">パスワード変更</h1>
		</div>

		<div class="form-card">
			<form method="post" th:action="@{/team2/profile/password}" th:object="${team2PasswordEditForm}">

				<span class="form-label">現在のパスワード<span class="required">必須</span></span>
				<input type="password" th:field="*{currentPassword}" class="form-input">
				<span class="form-error" th:if="${#fields.hasErrors('currentPassword')}"
					th:errors="*{currentPassword}"></span>
				<span class="form-error" th:if="${currentPasswordError}" th:text="${currentPasswordError}"></span>

				<span class="form-label">新しいパスワード<span class="required">必須</span></span>
				<span class="input-note">半角英数字・記号・8〜20文字で入力してください</span>
				<input type="password" th:field="*{newPassword}" class="form-input">
				<span class="form-error" th:if="${#fields.hasErrors('newPassword')}" th:errors="*{newPassword}"></span>

				<span class="form-label">新しいパスワード（確認）<span class="required">必須</span></span>
				<span class="input-note">確認のため、同じパスワードを入力してください</span>
				<input type="password" th:field="*{confirmPassword}" class="form-input">
				<span class="form-error" th:if="${#fields.hasErrors('confirmPassword')}"
					th:errors="*{confirmPassword}"></span>
				<span class="form-error" th:if="${confirmPasswordError}" th:text="${confirmPasswordError}"></span>

				<input type="submit" value="変更する" class="btn btn-primary">
			</form>
		</div>

	</div>

</body>

</html>
