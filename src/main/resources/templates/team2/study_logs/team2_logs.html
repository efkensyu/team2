<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.ofg">

<head>
	<meta charset="UTF-8">

	<link rel="stylesheet" type="text/css" th:href="@{/team2/css/team2_header.css}">
	<link rel="stylesheet" type="text/css" th:href="@{/team2/css/team2_main.css}">
	<link rel="stylesheet" type="text/css" th:href="@{/team2/css/team2_logs.css}">

	<title>study log - タイムライン</title>
</head>

<body>

	<header th:replace="~{team2/kyoutu/team2_header :: header}"></header>

	<div class="page-wrapper logs-wrapper">

		<div class="page-header">
			<a class="back-link" th:href="@{/team2/home}" th:text="'← 戻る'"></a>
			<h1 class="page-title" th:text="タイムライン"> </h1>
		</div>
		
		<div class="success-message" th:if="${successMessage}" th:text="${successMessage}"></div>

		<div class="logs-list">

			<div class="log-card" th:each="log : ${logs}">

				<div class="log-card-header">

					<div class="log-user-area">

						<img src="/team2/img/team2_user.png" alt="user icon" class="user-icon">
						<span class="log-user" th:text="${log.user.userName}"></span>

					</div>

					<span class="log-date"th:text="${#temporals.format(log.studyDate, 'yyyy年MM月dd日')}"></span>

				</div>

				<div class="log-field" th:text="${log.field.fieldName}"></div>

				<div class="log-title" th:text="${log.studyName}"></div>
				
				<div class="log-time" th:text="${log.studyTime / 60} + '時間' + ${log.studyTime % 60} + '分'"></div>
				<div class="log-action">
					<a th:href="@{/team2/logs/{id}(id=${log.studyLogId})}" class="detail-link">
						<span th:text="'詳細'"></span>
					</a>
				</div>
			</div>
		</div>
	</div>
</body>
</html>
