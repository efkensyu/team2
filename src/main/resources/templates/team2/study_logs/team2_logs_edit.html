<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.ofg">

<head>
	<meta charset="UTF-8">
	<link rel="stylesheet" type="text/css" href="/team2/css/team2_header.css">
	<title>新規学習記録登録</title>
</head>


<body>
	<header th:replace="~{team2/kyoutu/team2_header :: header}"></header>
	<h1>学習記録演習</h1>
	<a th:href="@{/team2/home}">
		<button type="button">戻る</button>
	</a>

	<form method="post" th:action="@{/team2/logs/{id}/edit(id=${team2StudyLogsForm.studyLogId})}" th:object="${team2StudyLogsForm}" >
		
		<!-- 分野 -->
		<h4>分野</h4>
		<select th:field="*{fieldId}">
			<option value="0">選択してください</option>
			<option value="1">人間力</option>
			<option value="2">技術力</option>
			<option value="3">資格</option>
			<option value="4">その他</option>
		</select>
		<span th:if="${#fields.hasErrors('fieldId')}" th:errors="*{fieldId}"></span>
		
		<!-- 学習名 -->
		<h4>学習名</h4>
		<input type="text" th:field="*{studyName}" />
		<span th:if="${#fields.hasErrors('studyName')}" th:errors="*{studyName}"></span>
		
		<!-- 学習日 -->
		<h4>学習日</h4>
		<input type="date" th:field="*{studyDate}" />
		<span th:if="${#fields.hasErrors('studyDate')}" th:errors="*{studyDate}"></span>
		
		<!-- 学習時間 -->
		<h4>学習時間</h4>
		<input type="number" th:field="*{studyHour}" min="0" />時間
		<input type="number" th:field="*{studyMinute}" min="0" max="59" />分
		<span th:if="${#fields.hasErrors('studyHour')}" th:errors="*{studyHour}"></span>
		<span th:if="${#fields.hasErrors('studyMinute')}" th:errors="*{studyMinute}"></span>
		
		<br><br>
		<input type="submit" value="更新">
	</form>
</body>

</html>
