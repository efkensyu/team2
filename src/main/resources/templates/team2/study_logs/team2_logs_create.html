<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.ofg">

<head>
	<meta charset="UTF-8">
	<link rel="stylesheet" type="text/css" href="/team2/css/team2_header.css">
	<link rel="stylesheet" type="text/css" href="/team2/css/team2_main.css">
	<link rel="stylesheet" type="text/css" href="/team2/css/team2_logs_create.css">
	<title>study log - 学習記録登録</title>
</head>


<body>
	<header th:replace="~{team2/kyoutu/team2_header :: header}"></header>

	<div class="page-wrapper logs-create-wrapper">

		<div class="page-header">

			<a class="back-link" th:href="${session.backUrl}" th:text="'← 戻る'"></a>

			<h1 class="page-title" th:text="新規学習記録登録"></h1>

		</div>

		<form class="logs-create-form" method="post" th:action="@{/team2/logs/create}"
			th:object="${team2StudyLogsForm}">

			<!-- 分野 -->
			<div class="form-row">
				<span class="form-label">分野名<span class="required">必須</span></span>
				<div class="form-control-area">
					<select th:field="*{fieldId}">
						<option value="0" th:text="選択してください"></option>
						<option value="1" th:text="人間力"></option>
						<option value="2" th:text="技術力"></option>
						<option value="3" th:text="資格"></option>
						<option value="4" th:text="その他"></option>
					</select>
					<span th:if="${#fields.hasErrors('fieldId')}" th:errors="*{fieldId}" class="form-error"></span>
				</div>
			</div>

			<!-- 学習名 -->
			<div class="form-row">
				<span class="form-label">学習名<span class="required">必須</span></span>
				<div class="form-control-area">
					<input type="text" th:field="*{studyName}" class="form-input" placeholder="例：ITパスポート" />
					<span th:if="${#fields.hasErrors('studyName')}" th:errors="*{studyName}" class="form-error"></span>
					<span class="input-note">100文字以内で入力してください</span>
				</div>
			</div>

			<!-- 学習日 -->
			<div class="form-row">
			    <span class="form-label">学習日<span class="required">必須</span></span>
			    <div class="form-control-area">
					<input type="date" id="studyDate" name="studyDate" class="form-input" th:value="${team2StudyLogsForm.studyDate}" />
			        <span th:if="${#fields.hasErrors('studyDate')}" th:errors="*{studyDate}" class="form-error"></span>
			    </div>
			</div>


			<!-- 学習時間 -->
			<div class="form-row">
				<span class="form-label">学習時間<span class="required">必須</span></span>
				<div class="form-control-area">
					<input type="number" th:field="*{studyHour}" min="0" class="time-input" />
					<span th:text="時間"></span>
					<input type="number" th:field="*{studyMinute}" min="0" max="59" class="time-input" />
					<span th:text="分"></span>
					<span class="input-note">1分以上で入力してください</span>
					<span th:if="${#fields.hasErrors('studyHour')}" th:errors="*{studyHour}" class="form-error"></span>
					<span th:if="${#fields.hasErrors('studyMinute')}" th:errors="*{studyMinute}" class="form-error"></span>
					<span th:if="${studyTimeError}" th:text="${studyTimeError}" class="form-error"></span>
				</div>
			</div>

			<!-- 学習内容 -->
			<div class="form-row">
				<span class="form-label">学習内容</span>
				<div class="form-control-area">
					<textarea th:field="*{studyContent}" placeholder="学習した内容を入力してください"></textarea>
					<span class="input-note">300文字以内で入力してください</span>
					<span th:if="${#fields.hasErrors('studyContent')}" th:errors="*{studyContent}"
						class="form-error"></span>
				</div>
			</div>

			<div class="submit-area">
				<input type="submit" value="登録" class="btn btn-primary">
			</div>

		</form>

	</div>

</body>

</html>
