<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.ofg">

<head>
	<meta charset="UTF-8">
	<link rel="stylesheet" type="text/css" th:href="@{/team2/css/team2_header.css}">
	<link rel="stylesheet" type="text/css" th:href="@{/team2/css/team2_main.css}">
	<link rel="stylesheet" type="text/css" th:href="@{/team2/css/team2_logs_detail.css}">
	<title>study log - 学習記録詳細</title>
</head>

<body>
	<header th:replace="~{team2/kyoutu/team2_header :: header}"></header>

	<div class="logs-detail-wrapper">

		<div class="page-header">
			<a class="back-link" th:href="@{/team2/logs}" th:text="'← 戻る'"></a>
			<h1 class="page-title" th:text="学習記録詳細"></h1>
		</div>

		<div class="success-message" th:if="${successMessage}" th:text="${successMessage}"></div>

		<div class="detail-card">

			<div class="detail-header">
				<div class="detail-user-area">
					<img src="/team2/img/team2_user.png" alt="user icon" class="user-icon">
					<span class="detail-user" th:text="${log.user.userName}"></span>
				</div>

				<span class="detail-date" th:text="${#temporals.format(log.studyDate, 'yyyy年MM月dd日')}"></span>
			</div>

			<div class="detail-field" th:text="${log.field.fieldName}"></div>

			<div class="detail-section">
				<div class="detail-label" th:text="学習名"></div>
				<div class="detail-value detail-title" th:text="${log.studyName}"></div>
			</div>

			<div class="detail-section">
				<div class="detail-label" th:text="学習内容"></div>
				<div class="detail-value detail-content" th:text="${log.studyContent}"></div>
			</div>

			<div class="detail-section">
				<div class="detail-label" th:text="学習時間"></div>
				<div class="detail-value" th:text="${log.studyTime / 60} + '時間' + ${log.studyTime % 60} + '分'"></div>
			</div>

			<div class="detail-actions" th:if="${log.userId == session.userId}">

				<a th:href="@{/team2/logs/{id}/edit(id=${log.studyLogId})}" class="detail-edit-link">
					<span th:text="'編集'"></span>
				</a>

				<form th:action="@{/team2/logs/{id}/delete(id=${log.studyLogId})}" method="post">
					<button type="submit" class="detail-delete-button"
						onclick="return confirm('この学習記録を削除しますか？')">削除</button>
				</form>

			</div>

		</div>

	</div>
</body>

</html>
