<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<link rel="stylesheet" type="text/css" th:href="@{/team2/css/team2_header.css}">
	<link rel="stylesheet" type="text/css" th:href="@{/team2/css/team2_main.css}">
	<link rel="stylesheet" type="text/css" th:href="@{/team2/css/team2_questions.css}">
	<title>Study Log - 問題一覧画面</title>
</head>

<body>
	<header th:replace="~{team2/kyoutu/team2_header :: header}"></header>
	
	<div class="page-wrapper">
		
		<div class="page-header">
			<a class="back-link" th:href="@{/team2/home}" th:text="'← 戻る'"></a>
			<h1 class="page-title" th:text="問題一覧画面"></h1>
		</div>
		
		<br>
		<div class="create-questions-button">
			<a th:href="@{/team2/questions/create}" style="display: inline-block;">
				<button type="button">＋作成する</button>
			</a>
		</div>
		
		
		<div>
			<div class="content-card" th:each="question : ${questions}">
				
				<div class="questions-user-area">
					<img th:src="@{/team2/img/team2_user.png}" alt="user icon" class="user-icon">
					<span th:text="${question.user.userName}"></span>
				</div>
				
				<div class="question-date" th:text="${#temporals.format(question.createdAt, 'yyyy年MM月dd日')}"></div>
				
				<div class="question-field" th:text="${question.field.fieldName}"></div>
				
				<div class="question-title"th:text="${question.studyName}"></div>
				
				
				<div class="question-button">
					<a th:href="@{/team2/questions/{id}(id=${question.questionId})}">
						<button type="button">詳細</button>
					</a>
					
					<a th:href="@{/team2/questions/{id}/answer(id=${question.questionId})}">
						<button type="button">回答する</button>
					</a>
				</div>
			</div>
		</div>
	</div>
</body>

</html>
